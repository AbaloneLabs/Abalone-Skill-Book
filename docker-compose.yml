services:
  abalone-skill-book:
    build:
      context: .
      dockerfile: Dockerfile
    image: abalone-skill-book:local
    ports:
      - "127.0.0.1:8732:8732"
    environment:
      ABALONE_SKILLS_ROOT: /app/skills
      ABALONE_DATABASE_PATH: /data/abalone.sqlite3
      ABALONE_MODEL_DIR: /models/bge-m3
      ABALONE_HTTP_HOST: 0.0.0.0
      ABALONE_HTTP_PORT: 8732
      ABALONE_MCP_PATH: /mcp
      ABALONE_HTTP_ALLOWED_HOSTS: localhost,127.0.0.1,abalone-skill-book
    volumes:
      - ./skills:/app/skills
      - ./models:/models:ro
      - ./.abalone:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8732/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
